<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFGtest - Coolify Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            padding: 3rem 2rem;
            max-width: 600px;
        }
        .status {
            display: inline-block;
            background: #065f46;
            color: #6ee7b7;
            padding: 0.4rem 1rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: #f8fafc;
        }
        p {
            font-size: 1.125rem;
            line-height: 1.7;
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .info {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.75rem;
            padding: 1.5rem;
            margin-top: 2rem;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #334155;
        }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: #64748b; }
        .info-value { color: #e2e8f0; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">Deployed</div>
        <h1>MFGtest</h1>
        <p>Tato stránka byla úspěšně nasazena přes Coolify. Vše funguje správně.</p>
        <div class="info">
            <div class="info-row">
                <span class="info-label">Server</span>
                <span class="info-value">Nginx Alpine</span>
            </div>
            <div class="info-row">
                <span class="info-label">Runtime</span>
                <span class="info-value">Docker</span>
            </div>
            <div class="info-row">
                <span class="info-label">Port</span>
                <span class="info-value">80</span>
            </div>
            <div class="info-row">
                <span class="info-label">Secret</span>
                <span class="info-value">__SECRET_MESSAGE__</span>
            </div>
        </div>
    </div>
</body>
</html>
